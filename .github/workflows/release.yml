name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Macビルド
        run: npm run build:mac

      - name: Releaseにアップロード
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Windowsビルド
        run: npm run build:win

      - name: Releaseにアップロード
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
